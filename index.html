<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice on conditional statements</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="assignment-wrapper">
        <div class="card">

            <h2>Address Lowercase Converter</h2>

            <p class="card-text">
                Convert mixed uppercase and lowercase addresses into lowercase before processing.
            </p>

            <input type="text" id="address" placeholder="Enter address">

            <button onclick="convertAddress()">
                Convert Address
            </button>

            <div class="result-box">

                <h3>Converted Address</h3>

                <p id="addressResult">
                    Your converted address will appear here.
                </p>

            </div>

        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
